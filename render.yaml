# render.yaml - Blueprint for Render.com deployment
services:
  - type: web
    name: polla-mundialista-2026
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /opt/render/project/src/polla.db
    disk:
      name: polla-data
      mountPath: /opt/render/project/src
      sizeGB: 1
